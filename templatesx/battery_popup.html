<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>บันทึกแบตเตอรี่ - {{ vin }}</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input[type="text"], input[type="number"], input[type="file"] {
            width: 100%; padding: 8px; margin-bottom: 10px;
            border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;
        }
        label { font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 4px; }
        button {
            width: 100%; padding: 10px; background: #28a745; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 1em;
        }
        button:hover { background: #218838; }
        #preview { max-width: 100%; margin-bottom: 15px; display: none; border-radius: 4px; border: 1px solid #ddd; }
        .existing-img { max-width: 100%; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ddd; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h3>{% if record %}แก้ไข{% else %}บันทึก{% endif %}ข้อมูลแบตเตอรี่ ({{ vin }})</h3>
    
    <form id="battForm" onsubmit="saveBattery(event)">
        <input type="hidden" name="vin" value="{{ vin }}">
        {% if record %}
        <input type="hidden" name="id" value="{{ record.id }}">
        {% endif %}

        <label>รูปภาพแบตเตอรี่:{% if record %} (เว้นว่างหากไม่ต้องการเปลี่ยน){% endif %}</label>
        <input type="file" name="image" accept="image/*" {% if not record %}required{% endif %} onchange="previewImage(this)">
        
        <img id="preview" src="">
        
        {% if record and record.image_path %}
        <div id="current-img-container">
            <p style="font-size:12px; color:#666;">รูปปัจจุบัน:</p>
            <img src="/{{ record.image_path }}" class="existing-img">
        </div>
        {% endif %}

        <label>ค่าความต่างศักย์ (Voltage):</label>
        <input type="text" name="voltage" required placeholder="เช่น 12.6V" value="{{ record.voltage if record else '' }}">
        
        <label>สุขภาพแบตเตอรี่ (Health):</label>
        <input type="text" name="health" required placeholder="เช่น 100% Good" value="{{ record.battery_health if record else '' }}">
        
        <label>สถานะการชาร์จ (SoC):</label>
        <input type="text" name="soc" required placeholder="เช่น 98%" value="{{ record.charge_status if record else '' }}">
        
        <label>CCA:</label>
        <input type="number" name="cca" required placeholder="เช่น 500" value="{{ record.cca_value if record else '' }}">
        
        <button type="submit" id="btnSave">{% if record %}อัปเดต (Update){% else %}บันทึก (Save){% endif %}</button>
    </form>
</div>

<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.style.display = "block";
                
                // ซ่อนรูปเก่าเมื่อเลือกรูปใหม่
                const oldImg = document.getElementById('current-img-container');
                if(oldImg) oldImg.style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveBattery(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        btn.innerText = "กำลังดำเนินการ...";
        btn.disabled = true;

        const formData = new FormData(e.target);
        
        // ตรวจสอบว่าเป็น Create หรือ Update
        const isUpdate = formData.has('id');
        const endpoint = isUpdate ? '/api/update_battery' : '/api/save_battery';

        fetch(endpoint, {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.ok) {
                alert(isUpdate ? 'อัปเดตสำเร็จ!' : 'บันทึกสำเร็จ!');
                if (window.opener && !window.opener.closed) {
                    window.opener.location.reload();
                }
                window.close();
            } else {
                alert('Error: ' + data.error);
                btn.innerText = isUpdate ? "อัปเดต (Update)" : "บันทึก (Save)";
                btn.disabled = false;
            }
        })
        .catch(err => {
            alert('Error: ' + err);
            btn.innerText = isUpdate ? "อัปเดต (Update)" : "บันทึก (Save)";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
